<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }</style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="#f0f2f5"/>

  <!-- Sidebar -->
  <rect width="208" height="720" fill="#001529"/>
  <rect x="0" y="0" width="208" height="64" fill="#002140"/>
  <rect x="16" y="20" width="32" height="24" rx="4" fill="#1677ff"/>
  <text x="56" y="36" fill="#ffffff" font-size="14" font-weight="600">SM2 协同签名</text>
  <text x="16" y="84" fill="#ffffff" font-size="14" opacity="0.7">📊  仪表盘</text>
  <text x="16" y="132" fill="#ffffff" font-size="14" opacity="0.7">👥  用户管理</text>
  <rect x="0" y="144" width="208" height="48" fill="#1677ff" opacity="0.2"/>
  <text x="16" y="174" fill="#1677ff" font-size="14" font-weight="500">✍️  签名服务</text>
  <text x="16" y="220" fill="#ffffff" font-size="14" opacity="0.7">🔑  密钥管理</text>
  <text x="16" y="268" fill="#ffffff" font-size="14" opacity="0.7">📋  操作日志</text>

  <!-- Header -->
  <rect x="208" y="0" width="992" height="64" fill="#ffffff"/>
  <text x="228" y="26" fill="#00000040" font-size="12">系统 / 签名服务</text>
  <text x="228" y="48" fill="#000000d9" font-size="18" font-weight="600">SM2 协同签名服务</text>
  <circle cx="1140" cy="32" r="16" fill="#1677ff"/>
  <text x="1133" y="37" fill="#ffffff" font-size="13">管</text>

  <!-- Alert info -->
  <rect x="228" y="80" width="908" height="54" rx="8" fill="#e6f4ff" stroke="#91caff" stroke-width="1"/>
  <text x="256" y="104" fill="#1677ff" font-size="18">ℹ</text>
  <text x="280" y="101" fill="#000000d9" font-size="13" font-weight="500">协同签名说明</text>
  <text x="280" y="118" fill="#00000073" font-size="12">此接口用于服务端参与协同签名计算。客户端需预先生成 K1 和 Q1=K1·G，计算消息哈希 E 后，将 Q1 和 E 提交到此接口。</text>

  <!-- Main content: two columns -->
  <!-- Left: Input form -->
  <rect x="228" y="150" width="430" height="540" rx="8" fill="#ffffff" filter="drop-shadow(0 1px 4px rgba(0,0,0,0.06))"/>
  <text x="248" y="178" fill="#000000d9" font-size="15" font-weight="600">签名请求</text>
  <line x1="228" y1="188" x2="658" y2="188" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Form fields -->
  <text x="248" y="218" fill="#000000d9" font-size="13">用户ID <text fill="#ff4d4f">*</text></text>
  <rect x="248" y="226" width="380" height="36" rx="6" fill="#ffffff" stroke="#1677ff" stroke-width="1.5"/>
  <text x="263" y="249" fill="#000000d9" font-size="13">e3a1f2c9-8b7a-4d6e-9f2c...</text>

  <text x="248" y="286" fill="#000000d9" font-size="13">Q1 点（Base64 编码）<text fill="#ff4d4f">*</text></text>
  <rect x="248" y="294" width="380" height="80" rx="6" fill="#ffffff" stroke="#d9d9d9" stroke-width="1"/>
  <text x="263" y="314" fill="#000000d9" font-size="12" font-family="monospace">BM3k7pQ2rFzLxNwJ8vAe1sHi</text>
  <text x="263" y="330" fill="#000000d9" font-size="12" font-family="monospace">5Yd9TgKmCbOuPfRn6Zq4Xe2W</text>
  <text x="263" y="346" fill="#000000d9" font-size="12" font-family="monospace">+cV3lDjI7hS0...</text>

  <text x="248" y="396" fill="#000000d9" font-size="13">消息哈希 E（Base64 编码）<text fill="#ff4d4f">*</text></text>
  <rect x="248" y="404" width="380" height="54" rx="6" fill="#ffffff" stroke="#d9d9d9" stroke-width="1"/>
  <text x="263" y="424" fill="#000000d9" font-size="12" font-family="monospace">7aB3cD4eF5gH6iJ7kL8mN9oP</text>
  <text x="263" y="440" fill="#000000d9" font-size="12" font-family="monospace">0qR1sT2uV3wX4y...</text>

  <rect x="248" y="476" width="120" height="40" rx="6" fill="#1677ff"/>
  <text x="278" y="501" fill="#ffffff" font-size="14" font-weight="500">执行签名</text>
  <rect x="380" y="476" width="80" height="40" rx="6" fill="#ffffff" stroke="#d9d9d9" stroke-width="1"/>
  <text x="404" y="501" fill="#000000d9" font-size="14">重置</text>

  <!-- Right: Result -->
  <rect x="674" y="150" width="462" height="540" rx="8" fill="#ffffff" filter="drop-shadow(0 1px 4px rgba(0,0,0,0.06))"/>
  <text x="694" y="178" fill="#000000d9" font-size="15" font-weight="600">签名结果</text>
  <line x1="674" y1="188" x2="1136" y2="188" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Success banner -->
  <rect x="694" y="200" width="422" height="40" rx="6" fill="#f6ffed" stroke="#b7eb8f" stroke-width="1"/>
  <text x="714" y="218" fill="#52c41a" font-size="16">✓</text>
  <text x="734" y="215" fill="#52c41a" font-size="13" font-weight="500">签名计算成功</text>
  <text x="734" y="230" fill="#52c41a" font-size="11">服务端已完成协同计算，请客户端组合最终签名</text>

  <!-- r value -->
  <text x="694" y="270" fill="#00000073" font-size="13">签名分量 r</text>
  <rect x="694" y="278" width="422" height="54" rx="6" fill="#fafafa" stroke="#f0f0f0" stroke-width="1"/>
  <text x="709" y="298" fill="#000000d9" font-size="11" font-family="monospace">A1B2C3D4E5F6A7B8C9D0E1F2G3H4I5</text>
  <text x="709" y="314" fill="#000000d9" font-size="11" font-family="monospace">J6K7L8M9N0O1P2Q3R4S5T6U7V8...</text>
  <text x="1090" y="296" fill="#1677ff" font-size="11">复制</text>

  <!-- s2 value -->
  <text x="694" y="356" fill="#00000073" font-size="13">签名分量 s2</text>
  <rect x="694" y="364" width="422" height="54" rx="6" fill="#fafafa" stroke="#f0f0f0" stroke-width="1"/>
  <text x="709" y="384" fill="#000000d9" font-size="11" font-family="monospace">X9Y8Z7W6V5U4T3S2R1Q0P9O8N7</text>
  <text x="709" y="400" fill="#000000d9" font-size="11" font-family="monospace">M6L5K4J3I2H1G0F9E8D7C6B5A4...</text>
  <text x="1090" y="382" fill="#1677ff" font-size="11">复制</text>

  <!-- s3 value -->
  <text x="694" y="442" fill="#00000073" font-size="13">签名分量 s3</text>
  <rect x="694" y="450" width="422" height="54" rx="6" fill="#fafafa" stroke="#f0f0f0" stroke-width="1"/>
  <text x="709" y="470" fill="#000000d9" font-size="11" font-family="monospace">F1E2D3C4B5A6F7E8D9C0B1A2F3</text>
  <text x="709" y="486" fill="#000000d9" font-size="11" font-family="monospace">E4D5C6B7A8F9E0D1C2B3A4F5E6...</text>
  <text x="1090" y="468" fill="#1677ff" font-size="11">复制</text>

  <!-- Info box -->
  <rect x="694" y="524" width="422" height="80" rx="6" fill="#fffbe6" stroke="#ffe58f" stroke-width="1"/>
  <text x="714" y="545" fill="#d48806" font-size="14">💡</text>
  <text x="734" y="545" fill="#ad6800" font-size="12" font-weight="500">客户端计算说明</text>
  <text x="714" y="562" fill="#ad6800" font-size="11">1. 计算 s1 = k1·s3 - r·d1 mod n</text>
  <text x="714" y="578" fill="#ad6800" font-size="11">2. 计算 s = s1·s2 mod n</text>
  <text x="714" y="594" fill="#ad6800" font-size="11">3. 最终签名为 (r, s)</text>
</svg>
