name: Release

# 推送 v* 标签时触发（如 git tag v0.1.0 && git push origin v0.1.0）
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # 创建 Release 并上传附件
  packages: write   # 推送 Docker 镜像到 GHCR

jobs:

  # ─────────────────────────────────────────────
  # Job 1: 编译 Linux x86_64 客户端 FFI 动态库
  # ─────────────────────────────────────────────
  build-client-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout（含子模块）
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 配置 SSH，用于拉取私有依赖 gm-sdk-rs
      - name: Setup SSH for gm-sdk-rs
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # 缓存 Cargo 注册表和构建产物，加快后续构建
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            client/target
          key: linux-cargo-${{ hashFiles('client/Cargo.lock') }}
          restore-keys: linux-cargo-

      # 缓存 cbindgen 二进制，避免每次从源码编译（约 10 分钟）
      - name: Cache cbindgen binary
        id: cache-cbindgen
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cbindgen
          key: cbindgen-linux-0.26.0

      - name: Install cbindgen
        if: steps.cache-cbindgen.outputs.cache-hit != 'true'
        run: cargo install cbindgen --version 0.26.0 --locked

      - name: Build FFI library (Linux)
        working-directory: client
        env:
          # Reason: gm-sdk-rs 通过 SSH URL 引用，需要系统 git CLI 才能使用 SSH agent
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: cargo build --release -p sm2_co_sign_ffi

      - name: Generate C header
        working-directory: client
        run: cbindgen --crate sm2_co_sign_ffi -o sm2_co_sign_ffi.h

      - name: Package SDK (Linux)
        run: |
          mkdir -p sdk/lib sdk/include
          cp client/target/release/libsm2_co_sign_ffi.so  sdk/lib/
          cp client/target/release/libsm2_co_sign_ffi.a   sdk/lib/
          cp client/sm2_co_sign_ffi.h                      sdk/include/
          tar -czf sm2-co-sign-sdk-linux-x86_64.tar.gz -C sdk .

      - name: Upload Linux SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-linux
          path: sm2-co-sign-sdk-linux-x86_64.tar.gz

  # ─────────────────────────────────────────────
  # Job 2: 编译 macOS ARM64 客户端 FFI 动态库
  # ─────────────────────────────────────────────
  build-client-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout（含子模块）
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup SSH for gm-sdk-rs
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            client/target
          key: macos-cargo-${{ hashFiles('client/Cargo.lock') }}
          restore-keys: macos-cargo-

      # 缓存 cbindgen 二进制，避免每次从源码编译（约 10 分钟）
      - name: Cache cbindgen binary
        id: cache-cbindgen
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cbindgen
          key: cbindgen-macos-0.26.0

      - name: Install cbindgen
        if: steps.cache-cbindgen.outputs.cache-hit != 'true'
        run: cargo install cbindgen --version 0.26.0 --locked

      - name: Build FFI library (macOS)
        working-directory: client
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: cargo build --release -p sm2_co_sign_ffi

      - name: Generate C header
        working-directory: client
        run: cbindgen --crate sm2_co_sign_ffi -o sm2_co_sign_ffi.h

      - name: Package SDK (macOS)
        run: |
          mkdir -p sdk/lib sdk/include
          cp client/target/release/libsm2_co_sign_ffi.dylib sdk/lib/
          cp client/sm2_co_sign_ffi.h                        sdk/include/
          tar -czf sm2-co-sign-sdk-macos-arm64.tar.gz -C sdk .

      - name: Upload macOS SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-macos
          path: sm2-co-sign-sdk-macos-arm64.tar.gz

  # ─────────────────────────────────────────────
  # Job 3: 构建并推送 Docker 镜像到 GHCR
  # ─────────────────────────────────────────────
  build-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout（含子模块）
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 启用 BuildKit，支持 GHA layer cache
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 提取镜像标签：版本号（如 0.1.0）+ latest
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Reason: GHA cache 复用上次构建的 layer，跳过未变更的 npm install / go mod download
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Job 4: 创建 GitHub Release（不等 macOS，先发布）
  # 依赖：Linux SDK + Docker（macOS 单独追加）
  # ─────────────────────────────────────────────
  release:
    needs: [build-client-linux, build-docker]
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux SDK
        uses: actions/download-artifact@v4
        with:
          name: sdk-linux

      - name: Write release notes
        run: |
          cat > release-notes.md << 'EOF'
          ## 📦 发布说明

          ### 🐳 Docker 镜像（后端服务）

          ```bash
          # 拉取并运行
          docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          docker run -d \
            -p 7094:7094 \
            -p 7093:7093 \
            -v cosign-data:/app/data \
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}

          # 业务接口: http://localhost:7094/api/*
          # 管理接口: http://localhost:7093/mapi/*
          # 健康检查: curl http://localhost:7093/mapi/health
          ```

          ### 📚 Client SDK 动态库

          | 平台 | 文件 | 内容 |
          |------|------|------|
          | Linux x86_64 | `sm2-co-sign-sdk-linux-x86_64.tar.gz` | `lib/libsm2_co_sign_ffi.so` · `lib/libsm2_co_sign_ffi.a` · `include/sm2_co_sign_ffi.h` |
          | macOS ARM64  | `sm2-co-sign-sdk-macos-arm64.tar.gz`  | `lib/libsm2_co_sign_ffi.dylib` · `include/sm2_co_sign_ffi.h` |
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: sm2-co-sign-sdk-linux-x86_64.tar.gz

  # ─────────────────────────────────────────────
  # Job 5: macOS SDK 完成后追加到已有 Release
  # 与 Job 4 并行推进，完成即上传，不阻塞发布
  # ─────────────────────────────────────────────
  upload-macos-sdk:
    needs: [build-client-macos, release]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS SDK
        uses: actions/download-artifact@v4
        with:
          name: sdk-macos

      # Reason: release job 已经创建了 Release，这里直接追加文件，避免重复创建
      - name: Upload macOS SDK to Release
        run: gh release upload ${{ github.ref_name }} sm2-co-sign-sdk-macos-arm64.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
