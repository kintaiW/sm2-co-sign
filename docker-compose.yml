version: "3.8"

services:
  cosign:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: sm2-co-sign:latest
    container_name: sm2-cosign
    ports:
      - "7094:7094"    # 业务接口 (/api/*)
      - "7093:7093"    # 管理接口 (/mapi/*)
    volumes:
      - cosign-data:/app/data        # SQLite 数据库持久化
      # - ./custom-config.yaml:/app/config.yaml:ro   # 自定义配置（可选）
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:7093/mapi/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  cosign-data:
    driver: local
